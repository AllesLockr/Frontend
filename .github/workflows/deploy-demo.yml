name: Deploy Demo (Frontend)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t alleslocker-frontend:latest .

      - name: Deploy with docker compose
        run: cd /opt/alleslocker && docker compose up -d --force-recreate

      - name: Clean up old images
        run: docker image prune -f
